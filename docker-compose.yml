services:
  mongo:
    image: mongo:7
    container_name: vyavastha-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: vyavastha
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
    container_name: vyavastha-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/vyavastha
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - mongo

  analyze:
    build:
      context: ./analyze_service
    container_name: vyavastha-analyze
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/docs', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    container_name: vyavastha-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://vyavastha-backend:5000/api
      VITE_ANALYZE_URL: http://vyavastha-analyze:8000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - backend
      - analyze

volumes:
  mongo-data:
