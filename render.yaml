services:
  - type: web
    name: vyavastha-backend
    env: node
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false      # set this in Render dashboard → your Atlas URI
      - key: JWT_SECRET
        sync: false      # set this in Render dashboard
      - key: JWT_EXPIRE
        value: 30d
      - key: FAST2SMS_API_KEY
        sync: false
